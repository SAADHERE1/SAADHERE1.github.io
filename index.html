  background:linear-gradient(135deg,#060816,#0b1c3a);

/* SIMPLE FLOAT BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  top:0;left:0;
  z-index:-1;
}

.circle{
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.3;
  animation:move 10s infinite ease-in-out;
}

.c1{background:#6C63FF;top:10%;left:20%;}
.c2{background:#00c2ff;top:60%;left:70%;}

@keyframes move{
  0%{transform:translateY(0)}
  50%{transform:translateY(-40px)}
  100%{transform:translateY(0)}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

img{
  width:140px;
  height:140px;
  border-radius:50%;
  border:3px solid #6C63FF;
  object-fit:cover;
}

h1{margin:10px 0;font-size:2rem;}

.btn{
  margin-top:10px;
  display:flex;
  gap:10px;
}

a{
  text-decoration:none;
  padding:10px 14px;
  border-radius:8px;
}

.whatsapp{background:#6C63FF;color:white;}
.email{border:1px solid #fff;color:white;}

/* SECTIONS */
section{
  padding:50px 20px;
  text-align:center;
}

.card{
  background:rgba(255,255,255,0.05);
  margin:10px;
  padding:15px;
  border-radius:10px;
  display:inline-block;
}

</style>
</head>
